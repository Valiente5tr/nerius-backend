steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "."

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    waitFor: ["build"]
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    waitFor: ["push"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      # Cloud SQL: add --add-cloudsql-instances=PROJECT:REGION:INSTANCE once created
      # Secrets: configure DATABASE_URL or MYSQL_* vars in Cloud Run console or via:
      #   --set-secrets=MYSQL_ROOT_PASSWORD=nerius-db-password:latest
      - "--set-env-vars=APP_ENV=production,APP_DEBUG=false"
      - "--update-env-vars=CORS_ORIGINS=${_CORS_ORIGINS}"

substitutions:
  _REGION: us-central1
  _REPOSITORY: nerius
  _SERVICE_NAME: nerius-backend
  # Set to your frontend URL, e.g. https://nerius.web.app,https://nerius.app
  _CORS_ORIGINS: "https://your-frontend-domain.com"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
